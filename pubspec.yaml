name: flow_reading
description: "An offline-first, context-aware EPUB reader."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.9
  crypto: ^3.0.6
  # 12.0.0-beta.3+ fixes plugin registration with AGP 9 in legacy Kotlin mode.
  file_picker: 12.0.0-beta.7
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  html: ^0.15.6
  logging: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.3
  xml: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.2

flutter:
  uses-material-design: true
